<!DOCTYPE html>
<html>
<head>
<title>Solar System 3D Script</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="includes/style.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="includes/include.js"></script>

</head>
<body>

<div id="header"></div>

<!-- HERO -->
<section class="hero" style="background-image:url('https://picsum.photos/1920/1080');">
  <div>
    <h1 class="display-1 fw-bold">Solar System Script</h1>
    <p class="lead">Explore the solar system and learn about each planet</p>
  </div>
</section>

<section class="section">
  <h1 class="display-1 fw-bold py-5 m-5">The Script</h1>

  <div class="big-card text-start">

    <!-- BUTTONS -->
    <div class="d-flex justify-content-end mb-3">
      <button onclick="copyScript()" class="btn btn-primary me-2">Copy</button>
      <button onclick="downloadScript()" class="btn btn-success">Download</button>
    </div>

    <!-- SCRIPT PLACEHOLDER -->
    <pre id="scriptContent" style="
      background:#0b0f1a;
      padding:20px;
      border-radius:15px;
      overflow:auto;
      max-height:400px;
      color:#00d4ff;
    ">
        function example() {
            console.log("Your script goes here...");
        }
    </pre>

  </div>
</section>

<script>
// COPY FUNCTION
function copyScript() {
  const text = document.getElementById("scriptContent").innerText;

  navigator.clipboard.writeText(text).then(() => {
    alert("Script copied!");
  });
}

// DOWNLOAD FUNCTION
function downloadScript() {
  const text = document.getElementById("scriptContent").innerText;

  const blob = new Blob([text], { type: "text/plain" });
  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "script.txt";
  link.click();
}
</script>

<div id="footer"></div>

</body>
</html>
